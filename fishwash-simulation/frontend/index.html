<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古代鱼洗铜盆振动模态仿真与喷水高度分析系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="top-header">
        <div class="header-left">
            <span class="header-icon">⚱</span>
            <h1>古代鱼洗铜盆振动模态仿真与喷水高度分析系统</h1>
        </div>
        <div class="header-right">
            <div class="alert-indicator" id="alertIndicator">
                <span class="alert-dot"></span>
                <span class="alert-text">告警正常</span>
            </div>
            <div class="connection-status" id="connectionStatus">
                <span class="status-dot"></span>
                <span>未连接</span>
            </div>
        </div>
    </header>

    <div class="main-container">
        <aside class="left-panel">
            <div class="panel-section">
                <h2 class="section-title">设备选择</h2>
                <div class="device-selector-wrap">
                    <select id="deviceSelector" class="device-selector">
                        <option value="">-- 请选择设备 --</option>
                    </select>
                </div>
            </div>

            <div class="panel-section">
                <h2 class="section-title">传感器数据</h2>
                <div class="sensor-cards">
                    <div class="sensor-card">
                        <div class="sensor-label">摩擦频率</div>
                        <div class="sensor-value" id="frictionFreq">--</div>
                        <div class="sensor-unit">Hz</div>
                    </div>
                    <div class="sensor-card">
                        <div class="sensor-label">振幅</div>
                        <div class="sensor-value" id="amplitude">--</div>
                        <div class="sensor-unit">mm</div>
                    </div>
                    <div class="sensor-card">
                        <div class="sensor-label">喷水高度</div>
                        <div class="sensor-value" id="sprayHeight">--</div>
                        <div class="sensor-unit">cm</div>
                    </div>
                    <div class="sensor-card">
                        <div class="sensor-label">水温</div>
                        <div class="sensor-value" id="waterTemp">--</div>
                        <div class="sensor-unit">°C</div>
                    </div>
                </div>
            </div>

            <div class="panel-section">
                <h2 class="section-title">告警列表</h2>
                <div class="alert-list" id="alertList">
                    <div class="alert-empty">暂无告警</div>
                </div>
            </div>
        </aside>

        <main class="center-area">
            <div class="viewport-section">
                <div class="viewport-container" id="viewport3d">
                    <canvas id="threeCanvas"></canvas>
                </div>
                <div class="control-bar">
                    <div class="control-group">
                        <label for="modeOrder">模态阶数</label>
                        <select id="modeOrder" class="control-select">
                            <option value="2">2阶</option>
                            <option value="3">3阶</option>
                            <option value="4">4阶</option>
                            <option value="5">5阶</option>
                            <option value="6">6阶</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <button id="simulateBtn" class="btn-simulate">启动仿真</button>
                    </div>
                    <div class="control-group control-group--slider">
                        <label for="frictionSlider">摩擦频率</label>
                        <input type="range" id="frictionSlider" class="control-slider" min="0" max="500" value="100" step="1">
                        <span class="slider-value" id="frictionSliderValue">100 Hz</span>
                    </div>
                </div>
            </div>

            <div class="charts-section">
                <div class="chart-container">
                    <h3 class="chart-title">振动模态分析</h3>
                    <canvas id="vibrationChart"></canvas>
                </div>
                <div class="chart-container">
                    <h3 class="chart-title">喷水高度趋势</h3>
                    <canvas id="sprayChart"></canvas>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <script src="js/fishWashModel.js"></script>
    <script src="js/waterSurface.js"></script>
    <script src="js/sprayParticles.js"></script>
    <script src="js/fish_basin_3d.js"></script>
    <script src="js/vibration_panel.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
